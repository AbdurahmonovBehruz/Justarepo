<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat | Camilla</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');

    :root {
      --bg: #0f172a; 
      --bg-light: #f1f5f9;
      --panel: rgba(255, 255, 255, 0.65);
      --text: #0f172a;
      --muted: #475569;
      --border: rgba(0, 0, 0, 0.1);
      --accent: #7c3aed;
      --heading-gradient: linear-gradient(90deg, #1e293b, #7c3aed, #2563eb);
      --input-bg: rgba(255, 255, 255, 0.8);
      --input-color: #000;
      --board-title-color: #1e293b;
      
      --msg-self-bg: linear-gradient(135deg, #c084fc, #8b5cf6);
      --msg-self-text: #ffffff;
      --msg-other-bg: rgba(255, 255, 255, 0.9);
      --msg-other-text: #0f172a;

      --glass-shadow: 0 10px 40px -10px rgba(0,0,0,0.1), inset 0 0 0 1px rgba(255, 255, 255, 0.5);
    }

    html.dark {
      --bg-light: #0f172a;
      --panel: rgba(30, 41, 59, 0.65);
      --text: #f8fafc;
      --muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.1);
      --heading-gradient: linear-gradient(90deg, #f8fafc, #c084fc, #60a5fa);
      --input-bg: rgba(15, 23, 42, 0.8);
      --input-color: #f8fafc;
      --board-title-color: #f8fafc;
      
      --msg-self-bg: linear-gradient(135deg, #a855f7, #7c3aed);
      --msg-other-bg: rgba(30, 41, 59, 0.9);
      --msg-other-text: #f8fafc;

      --glass-shadow: 0 10px 40px -10px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.1);
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background-color: var(--bg-light);
      background-image: radial-gradient(circle at top right, rgba(168, 85, 247, 0.1), transparent 40%),
                        radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.1), transparent 40%);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      margin: 0;
      padding: 16px;
      overflow: hidden;
      transition: background-color 0.6s ease, color 0.6s ease;
    }

    .chat-wrapper {
      width: 100%; max-width: 800px;
      height: 100%;
      margin-top: 60px;
      position: relative;
      padding: 8px; 
      border-radius: 1.6rem;
    }

    .animated-border {
      position: absolute;
      inset: 0;
      border-radius: 1.6rem;
      padding: 8px; 
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .animated-border::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%; width: 200%; height: 200%;
      background: conic-gradient(from 0deg, transparent 30%, red, yellow, green, blue, purple);
      animation: snakeGlow 39s linear infinite;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .chat-wrapper:hover .animated-border::before { opacity: 1; }

    @keyframes snakeGlow {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .chat-inner {
      background: var(--panel);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: calc(1.6rem - 8px); 
      height: 100%;
      display: flex; flex-direction: column; 
      padding: 20px;
      position: relative;
      z-index: 1;
      box-shadow: var(--glass-shadow);
    }

    .list-header { text-align: center; margin-bottom: 20px; }
    .list-header h2 { font-size: 2rem; color: var(--board-title-color); margin: 0; font-weight: 800; background: var(--heading-gradient); -webkit-background-clip: text; background-clip: text; color: transparent;}

    .chat-history {
      flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 16px;
      padding-right: 10px; margin-bottom: 20px;
    }
    
    .chat-history::-webkit-scrollbar { width: 6px; }
    .chat-history::-webkit-scrollbar-track { background: transparent; }
    .chat-history::-webkit-scrollbar-thumb { background: rgba(168, 85, 247, 0.3); border-radius: 10px; }

    .message-container { display: flex; flex-direction: column; max-width: 85%; }
    .message-container.self { align-self: flex-end; align-items: flex-end; }
    .message-container.other { align-self: flex-start; align-items: flex-start; }

    .message-sender { font-size: 12px; color: var(--muted); margin-bottom: 4px; font-weight: 600; padding: 0 4px; }
    
    .message-bubble-wrapper { display: flex; align-items: center; gap: 10px; }
    .message-container.self .message-bubble-wrapper { flex-direction: row-reverse; }

    .message-actions { display: flex; gap: 8px; opacity: 0; transition: opacity 0.2s ease; }
    .message-container:hover .message-actions { opacity: 1; }
    .message-actions i { cursor: pointer; color: var(--muted); font-size: 14px; transition: color 0.2s; }
    .message-actions i:hover { color: var(--accent); }

    .message-bubble { padding: 12px 18px; border-radius: 1.25rem; font-size: 15px; line-height: 1.4; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); word-break: break-word; position: relative; }
    .message-container.self .message-bubble { background: var(--msg-self-bg); color: var(--msg-self-text); border-bottom-right-radius: 4px; }
    .message-container.other .message-bubble { background: var(--msg-other-bg); color: var(--msg-other-text); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

    .message-time { font-size: 10px; opacity: 0.7; margin-top: 6px; display: block; text-align: right; }
    .msg-edited { font-size: 10px; opacity: 0.6; margin-left: 6px; font-style: italic; }

    .chat-input-wrapper { display: flex; gap: 10px; }
    
    input.chat-input {
      flex: 1; padding: 16px 20px; border-radius: 100px; border: 2px solid rgba(0, 0, 0, 0.05); outline: none;
      background: var(--input-bg); color: var(--input-color); font-size: 16px; font-family: inherit; transition: all 0.4s ease;
    }
    html.dark input.chat-input { border-color: rgba(255, 255, 255, 0.1); }
    input.chat-input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(168, 85, 247, 0.2); }

    button.btn-add { padding: 14px 24px; border: none; border-radius: 100px; cursor: pointer; font-weight: 700; font-size: 16px; transition: all 0.3s ease; background: linear-gradient(135deg, #c084fc, #8b5cf6); color: white; box-shadow: 0 10px 25px rgba(168, 85, 247, 0.3); }
    button.btn-add:active { transform: scale(0.95); }
    button.btn-add:hover { box-shadow: 0 15px 35px rgba(168, 85, 247, 0.4); transform: translateY(-2px); }

    .info-custom { position: absolute; top: 20px; left: 20px; z-index: 1000; }
    .info-btn { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--accent); border: 1px solid var(--border); padding: 0; background: var(--panel);}
    .info-tooltip { position: absolute; top: calc(100% + 12px); left: 0; width: 280px; padding: 16px; transform: translateY(-10px); opacity: 0; transition: all 0.3s ease; pointer-events: none; border-radius: 1.5rem; background: var(--panel); backdrop-filter: blur(24px); box-shadow: var(--glass-shadow);}
    .info-tooltip.show { transform: translateY(0); opacity: 1; pointer-events: auto; }

    .top-controls-wrapper { position: absolute; top: 20px; right: 20px; display: flex; gap: 12px; z-index: 1000; }
    .theme-switch { width: 56px; height: 32px; border-radius: 30px; cursor: pointer; display: flex; align-items: center; padding: 3px; border: 1px solid var(--border); background: var(--panel);}
    .theme-thumb { width: 24px; height: 24px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: transform 0.4s; }
    html.dark .theme-thumb { transform: translateX(24px); background: #1e293b; }
    .sun-icon { font-size: 13px; color: #f59e0b; position: relative; }
    .moon-icon { font-size: 11px; color: #fde047; position: absolute; opacity: 0; transform: scale(0.5) rotate(-45deg); transition: all 0.3s; }
    html.dark .sun-icon { opacity: 0; transform: scale(0.5) rotate(45deg); position: absolute; }
    html.dark .moon-icon { opacity: 1; transform: scale(1) rotate(0deg); position: relative; }

    .lang-custom { position: relative; }
    .lang-trigger { display: flex; align-items: center; padding: 8px 16px; border: 1px solid var(--border); cursor: pointer; font-weight: 600; font-size: 14px; background: var(--panel); border-radius: 100px;}
    .lang-dropdown { position: absolute; top: calc(100% + 12px); right: 0; width: 160px; padding: 8px; display: none; flex-direction: column; gap: 4px; border-radius: 1rem; background: var(--panel); backdrop-filter: blur(24px); box-shadow: var(--glass-shadow);}
    .lang-dropdown.show { display: flex; }
    .lang-option { padding: 10px; border-radius: 12px; cursor: pointer; font-weight: 500; transition: 0.2s; }
    .lang-option:hover { background: rgba(124, 58, 237, 0.1); color: var(--accent); }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 9999;
      display: none; align-items: center; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal-box {
      background: var(--panel); box-shadow: var(--glass-shadow); border-radius: 1.5rem; padding: 24px;
      width: 90%; max-width: 400px;
    }
    .modal-btn { padding: 10px 18px; border-radius: 100px; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .modal-btn-cancel { background: transparent; color: var(--muted); }
    .modal-btn-cancel:hover { background: rgba(0,0,0,0.05); }
    html.dark .modal-btn-cancel:hover { background: rgba(255,255,255,0.05); }
    .modal-btn-primary { background: var(--accent); color: white; }
    .modal-btn-primary:hover { opacity: 0.9; }
    .modal-btn-danger { background: #ef4444; color: white; }
    .modal-btn-danger:hover { background: #dc2626; }
    
    @media (max-width: 640px) {
      .chat-wrapper { margin-top: 50px; padding: 4px; }
      .animated-border { padding: 4px; }
      .chat-inner { padding: 10px; border-radius: calc(1.6rem - 4px); }
      .top-controls-wrapper { top: 10px; right: 10px; gap: 8px; } 
      .info-custom { top: 10px; left: 10px; }
    }
  </style>
</head>
<body>

  <div id="modalOverlay" class="modal-overlay">
    <div id="editModal" class="modal-box hidden">
      <h3 id="txtEditTitle" class="text-xl font-bold mb-4">Редактировать сообщение</h3>
      <input type="text" id="editInput" class="w-full mb-5 px-4 py-3 rounded-2xl border-2 border-black/5 dark:border-white/10 outline-none focus:border-purple-500 bg-white/50 dark:bg-slate-900/50">
      <div class="flex justify-end gap-2">
        <button id="btnEditCancel" class="modal-btn modal-btn-cancel">Отмена</button>
        <button id="btnEditSave" class="modal-btn modal-btn-primary">Сохранить</button>
      </div>
    </div>
    <div id="deleteModal" class="modal-box hidden">
      <h3 id="txtDelTitle" class="text-xl font-bold mb-2">Удалить сообщение?</h3>
      <p id="txtDelDesc" class="mb-5 text-sm text-slate-500 dark:text-slate-400">Это действие нельзя отменить.</p>
      <div class="flex justify-end gap-2">
        <button id="btnDelCancel" class="modal-btn modal-btn-cancel">Отмена</button>
        <button id="btnDelConfirm" class="modal-btn modal-btn-danger">Удалить</button>
      </div>
    </div>
  </div>

  <div class="info-custom">
    <button class="info-btn" id="infoTrigger"><i class="fa-solid fa-circle-info"></i></button>
    <div class="info-tooltip" id="infoTooltip">
      <h4 id="infoTitle" class="text-lg font-bold mb-2 text-slate-800 dark:text-slate-200">Информация</h4>
      <p id="infoText" class="text-sm text-slate-600 dark:text-slate-400 leading-relaxed"></p>
    </div>
  </div>

  <div class="top-controls-wrapper">
    <div class="theme-switch" id="themeToggle">
      <div class="theme-thumb"><i class="fa-solid fa-sun sun-icon"></i><i class="fa-solid fa-star moon-icon"></i></div>
    </div>
    <div class="lang-custom">
      <button class="lang-trigger" id="langTrigger">
        <span id="activeLangFlag">🇷🇺</span> <span id="activeLangText" class="ml-2 hidden sm:inline">Русский</span>
      </button>
      <div class="lang-dropdown" id="langMenu">
        <div class="lang-option" data-value="en"><span>🇬🇧</span> English</div>
        <div class="lang-option" data-value="ru"><span>🇷🇺</span> Русский</div>
        <div class="lang-option" data-value="uz"><span>🇺🇿</span> O'zbekcha</div>
      </div>
    </div>
  </div>

  <div class="chat-wrapper">
    <div class="animated-border"></div>
    <div class="chat-inner">
      <div class="list-header">
        <h2 id="chatHeaderTitle">Chat with Behruz</h2>
      </div>
      
      <div id="chatHistory" class="chat-history">
        <!-- Messages -->
      </div>

      <div class="chat-input-wrapper">
        <input type="text" id="msgInput" class="chat-input" placeholder="Введите сообщение..." autocomplete="off">
        <button id="sendBtn" class="btn-add"><i class="fa-solid fa-paper-plane"></i></button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, onChildChanged, onChildRemoved, update, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const CURRENT_USER = "Camilla";
    const OTHER_USER = "Behruz";

    const firebaseConfig = {
      apiKey: "AIzaSyAWlrdAvIc2o18IDMqnMsfWMLsMKwq0n3Y",
      authDomain: "gyyggh-2f341.firebaseapp.com",
      databaseURL: "https://gyyggh-2f341-default-rtdb.europe-west1.firebasedatabase.app/",
      projectId: "gyyggh-2f341",
      storageBucket: "gyyggh-2f341.firebasestorage.app",
      messagingSenderId: "1042128448387",
      appId: "1:1042128448387:web:0a73c087cfced7d96464b6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const messagesRef = ref(db, 'chat_messages');

    const themeToggle = document.getElementById('themeToggle');
    function setTheme(isDark) {
      document.documentElement.classList.toggle('dark', isDark);
      localStorage.setItem('chatTheme', isDark ? 'dark' : 'light');
    }
    const savedTheme = localStorage.getItem('chatTheme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    setTheme(savedTheme ? savedTheme === 'dark' : prefersDark);
    themeToggle.addEventListener('click', () => setTheme(!document.documentElement.classList.contains('dark')));

    const translations = {
      en: { header: `Chat with ${OTHER_USER}`, infoTitle: "Information", infoText: "This site is a personal chat. Created to connect Behruz and Camilla.", phMsg: "Type a message...", langName: "English", flag: "🇬🇧", editTitle: "Edit Message", btnCancel: "Cancel", btnSave: "Save", delTitle: "Delete message?", delDesc: "This cannot be undone.", btnDel: "Delete" },
      ru: { header: `Чат с ${OTHER_USER}`, infoTitle: "Информация", infoText: "Этот сайт - личный чат. Создан чтобы связывать Бехруза и Камилу.", phMsg: "Введите сообщение...", langName: "Русский", flag: "🇷🇺", editTitle: "Редактировать сообщение", btnCancel: "Отмена", btnSave: "Сохранить", delTitle: "Удалить сообщение?", delDesc: "Это действие нельзя отменить.", btnDel: "Удалить" },
      uz: { header: `${OTHER_USER} bilan chat`, infoTitle: "Ma'lumot", infoText: "Ushbu sayt - shaxsiy chat. Behruz va Kamillani bog'lash uchun yaratilgan.", phMsg: "Xabar yozing...", langName: "O'zbekcha", flag: "🇺🇿", editTitle: "Xabarni tahrirlash", btnCancel: "Bekor qilish", btnSave: "Saqlash", delTitle: "Xabarni o'chirish?", delDesc: "Buni qaytarib bo'lmaydi.", btnDel: "O'chirish" }
    };

    let currentLang = localStorage.getItem('chatLang');
    if (!currentLang) {
      const browserLang = navigator.language.slice(0, 2);
      currentLang = ['en', 'ru', 'uz'].includes(browserLang) ? browserLang : 'ru';
      localStorage.setItem('chatLang', currentLang);
    }
    
    function updateUI() {
      const t = translations[currentLang];
      document.getElementById('chatHeaderTitle').innerText = t.header;
      document.getElementById('infoTitle').innerText = t.infoTitle;
      document.getElementById('infoText').innerText = t.infoText;
      document.getElementById('msgInput').placeholder = t.phMsg;
      document.getElementById('activeLangFlag').innerText = t.flag;
      document.getElementById('activeLangText').innerText = t.langName;
      document.title = t.header;
      
      document.getElementById('txtEditTitle').innerText = t.editTitle;
      document.getElementById('btnEditCancel').innerText = t.btnCancel;
      document.getElementById('btnEditSave').innerText = t.btnSave;
      document.getElementById('txtDelTitle').innerText = t.delTitle;
      document.getElementById('txtDelDesc').innerText = t.delDesc;
      document.getElementById('btnDelCancel').innerText = t.btnCancel;
      document.getElementById('btnDelConfirm').innerText = t.btnDel;
    }

    const langMenu = document.getElementById('langMenu');
    document.getElementById('langTrigger').onclick = (e) => { e.stopPropagation(); langMenu.classList.toggle('show'); document.getElementById('infoTooltip').classList.remove('show'); };
    document.querySelectorAll('.lang-option').forEach(opt => {
      opt.onclick = () => { currentLang = opt.dataset.value; localStorage.setItem('chatLang', currentLang); langMenu.classList.remove('show'); updateUI(); };
    });
    document.getElementById('infoTrigger').onclick = (e) => { e.stopPropagation(); document.getElementById('infoTooltip').classList.toggle('show'); langMenu.classList.remove('show'); };
    document.addEventListener('click', () => { langMenu.classList.remove('show'); document.getElementById('infoTooltip').classList.remove('show'); });
    updateUI();

    const modalOverlay = document.getElementById('modalOverlay');
    const editModal = document.getElementById('editModal');
    const deleteModal = document.getElementById('deleteModal');
    const editInput = document.getElementById('editInput');
    
    let targetMsgId = null;
    let targetMsgText = "";

    function closeModal() {
      modalOverlay.classList.remove('show');
      editModal.classList.add('hidden');
      deleteModal.classList.add('hidden');
      targetMsgId = null; targetMsgText = "";
    }

    document.getElementById('btnEditCancel').onclick = closeModal;
    document.getElementById('btnDelCancel').onclick = closeModal;
    modalOverlay.addEventListener('click', (e) => { if(e.target === modalOverlay) closeModal(); });

    document.getElementById('btnEditSave').onclick = () => {
      const newText = editInput.value.trim();
      if(newText !== "" && newText !== targetMsgText && targetMsgId) {
        update(ref(db, 'chat_messages/' + targetMsgId), { text: newText, edited: true });
      }
      closeModal();
    };

    document.getElementById('btnDelConfirm').onclick = () => {
      if(targetMsgId) remove(ref(db, 'chat_messages/' + targetMsgId));
      closeModal();
    };

    const chatHistory = document.getElementById('chatHistory');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');

    function formatTime(ts) {
      const d = new Date(ts);
      return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
    }

    chatHistory.addEventListener('click', (e) => {
      if(e.target.closest('.edit-btn')) {
        const container = e.target.closest('.message-container');
        targetMsgId = container.dataset.id;
        targetMsgText = container.querySelector('.msg-text').innerText;
        editInput.value = targetMsgText;
        modalOverlay.classList.add('show');
        editModal.classList.remove('hidden');
        editInput.focus();
      }
      if(e.target.closest('.delete-btn')) {
        targetMsgId = e.target.closest('.message-container').dataset.id;
        modalOverlay.classList.add('show');
        deleteModal.classList.remove('hidden');
      }
    });

    onChildAdded(messagesRef, (snapshot) => {
      const msg = snapshot.val();
      const id = snapshot.key;
      const isSelf = msg.sender === CURRENT_USER;
      
      const el = document.createElement('div');
      el.className = `message-container ${isSelf ? 'self' : 'other'}`;
      el.dataset.id = id;
      
      let actionsHtml = isSelf ? `
        <div class="message-actions">
          <i class="fa-solid fa-pen edit-btn" title="Изменить"></i>
          <i class="fa-solid fa-trash delete-btn" title="Удалить"></i>
        </div>` : '';

      el.innerHTML = `
        <div class="message-sender">${msg.sender}</div>
        <div class="message-bubble-wrapper">
          <div class="message-bubble">
            <span class="msg-text">${msg.text}</span>
            ${msg.edited ? '<span class="msg-edited">(изм.)</span>' : ''}
            <span class="message-time">${formatTime(msg.timestamp)}</span>
          </div>
          ${actionsHtml}
        </div>
      `;
      chatHistory.appendChild(el);
      chatHistory.scrollTop = chatHistory.scrollHeight;
    });

    onChildChanged(messagesRef, (snapshot) => {
      const msg = snapshot.val();
      const el = document.querySelector(`.message-container[data-id="${snapshot.key}"]`);
      if(el) {
        el.querySelector('.msg-text').innerText = msg.text;
        if(msg.edited && !el.querySelector('.msg-edited')) {
          const timeSpan = el.querySelector('.message-time');
          timeSpan.insertAdjacentHTML('beforebegin', '<span class="msg-edited">(изм.)</span> ');
        }
      }
    });

    onChildRemoved(messagesRef, (snapshot) => {
      const el = document.querySelector(`.message-container[data-id="${snapshot.key}"]`);
      if(el) el.remove();
    });

    function sendMessage() {
      const text = msgInput.value.trim();
      if (!text) return;
      push(messagesRef, { sender: CURRENT_USER, text: text, timestamp: Date.now(), edited: false });
      msgInput.value = ''; msgInput.focus();
    }

    sendBtn.addEventListener('click', sendMessage);
    msgInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
  </script>
</body>
</html>
